<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI cover illustration</title>
  <desc id="desc">A futuristic AI brain chip with neural lines, conversation bubbles, and machine learning labels on a warm-tech gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="90" y1="70" x2="1500" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081D2E"/>
      <stop offset="0.46" stop-color="#153E5C"/>
      <stop offset="1" stop-color="#E3A64F"/>
    </linearGradient>
    <radialGradient id="flare" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 190) rotate(133) scale(620 500)">
      <stop stop-color="#F4D79F" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#F4D79F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="548" y1="212" x2="1066" y2="706" gradientUnits="userSpaceOnUse">
