<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gemini cover illustration</title>
  <desc id="desc">A luminous twin-orbit AI illustration with Gemini branding, multicolor stars, and device-friendly neural paths on a deep blue background.</desc>
  <defs>
    <linearGradient id="bg" x1="110" y1="82" x2="1490" y2="836" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071833"/>
      <stop offset="0.5" stop-color="#103C6E"/>
      <stop offset="1" stop-color="#12A0B3"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1230 210) rotate(142) scale(520 430)">
      <stop stop-color="#A2E9FF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#A2E9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(410 680) rotate(18) scale(480 360)">
      <stop stop-color="#FFD37B" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFD37B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring1" x1="555" y1="252" x2="946" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AF5FF"/>
      <stop offset="1" stop-color="#7A6FFF"/>
    </linearGradient>
    <linearGradient id="ring2" x1="642" y1="228" x2="1044" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD37B"/>
      <stop offset="1" stop-color="#52D6C5"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#061326" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="36" fill="url(#glowA)"/>
  <rect width="1600" height="900" rx="36" fill="url(#glowB)"/>

  <g opacity="0.2">
    <circle cx="208" cy="154" r="5" fill="#EBF9FF"/>
    <circle cx="324" cy="114" r="4" fill="#EBF9FF"/>
    <circle cx="1372" cy="142" r="6" fill="#EBF9FF"/>
    <circle cx="1288" cy="774" r="5" fill="#EBF9FF"/>
    <circle cx="290" cy="730" r="5" fill="#EBF9FF"/>
    <path d="M208 154L324 114L506 198L716 150L952 212L1178 166L1372 142" stroke="#EBF9FF" stroke-width="2" stroke-dasharray="7 11"/>
    <path d="M290 730L480 650L706 736L940 656L1178 724L1288 774" stroke="#EBF9FF" stroke-width="2" stroke-dasharray="7 11"/>
  </g>

  <g opacity="0.95">
    <text x="122" y="162" font-family="Verdana, Geneva, sans-serif" font-size="48" font-weight="700" fill="#EAFBFF">Google Gemini explained</text>
    <text x="122" y="220" font-family="Verdana, Geneva, sans-serif" font-size="28" fill="#BDEFFF">Multimodal AI • Search • Cloud • Mobile • On-device</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="528" y="192" width="544" height="516" rx="42" fill="#0B203F" fill-opacity="0.62" stroke="#A7E9FF" stroke-opacity="0.16" stroke-width="2"/>

    <ellipse cx="756" cy="448" rx="132" ry="194" transform="rotate(-14 756 448)" stroke="url(#ring1)" stroke-width="20"/>
    <ellipse cx="868" cy="448" rx="132" ry="194" transform="rotate(14 868 448)" stroke="url(#ring2)" stroke-width="20"/>

    <circle cx="688" cy="326" r="18" fill="#9AF5FF"/>
    <circle cx="940" cy="326" r="18" fill="#FFD37B"/>
    <circle cx="752" cy="586" r="16" fill="#7A6FFF"/>
    <circle cx="876" cy="586" r="16" fill="#52D6C5"/>

    <path d="M688 326L752 586" stroke="#9AF5FF" stroke-opacity="0.55" stroke-width="5" stroke-dasharray="8 10"/>
    <path d="M940 326L876 586" stroke="#FFD37B" stroke-opacity="0.55" stroke-width="5" stroke-dasharray="8 10"/>
    <path d="M752 586L876 586" stroke="#D8F7FF" stroke-opacity="0.32" stroke-width="4"/>
    <path d="M688 326L940 326" stroke="#D8F7FF" stroke-opacity="0.22" stroke-width="4"/>
  </g>

  <g>
    <rect x="1040" y="484" width="286" height="102" rx="22" fill="#F1FBFF" fill-opacity="0.12" stroke="#F1FBFF" stroke-opacity="0.2"/>
    <text x="1092" y="548" font-family="Verdana, Geneva, sans-serif" font-size="56" font-weight="700" fill="#F4FDFF">Gemini</text>
  </g>

  <g>
    <rect x="148" y="502" width="224" height="86" rx="18" fill="#0A233E" fill-opacity="0.62" stroke="#C4F3FF" stroke-opacity="0.14"/>
    <text x="184" y="556" font-family="Verdana, Geneva, sans-serif" font-size="32" font-weight="700" fill="#E9FBFF">Multimodal AI</text>

    <rect x="184" y="620" width="196" height="78" rx="18" fill="#0A233E" fill-opacity="0.54" stroke="#C4F3FF" stroke-opacity="0.12"/>
    <text x="228" y="670" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="700" fill="#E9FBFF">Google stack</text>

    <path d="M372 544C456 524 556 494 628 450" stroke="#FAD07A" stroke-width="3" stroke-dasharray="7 10"/>
    <path d="M380 658C474 640 566 584 658 532" stroke="#9AF5FF" stroke-width="3" stroke-dasharray="7 10"/>
  </g>

  <g>
    <rect x="1162" y="686" width="238" height="76" rx="18" fill="#F1FBFF" fill-opacity="0.12" stroke="#F1FBFF" stroke-opacity="0.18"/>
    <text x="1206" y="736" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700" fill="#F3FDFF">Cloud to device</text>
  </g>
</svg>
