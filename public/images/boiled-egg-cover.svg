<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Boiled egg cover illustration</title>
  <desc id="desc">Warm kitchen-style illustration showing a boiled egg cut in half with a golden yolk and soft steam.</desc>
